version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: loadpulse-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27018}:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: loadpulse-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  loadpulse:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACKEND_PORT: ${BACKEND_PORT:-4000}
    container_name: loadpulse-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-4000}
      PORT: ${BACKEND_PORT:-4000}
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: ${MONGODB_DB:-loadpulse}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_DEFAULT_TTL_SECONDS: ${REDIS_DEFAULT_TTL_SECONDS:-30}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:4000}
    ports:
      - "${FRONTEND_PORT:-4000}:${BACKEND_PORT:-4000}"
    depends_on:
      - mongo
      - redis

volumes:
  mongo-data:
  redis-data:
