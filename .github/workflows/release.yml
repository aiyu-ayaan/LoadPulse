name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Create release PR or publish GitHub release
        id: release
        uses: google-github-actions/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          target-branch: master
          config-file: .release-please-config.json

      - name: Checkout repository
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v4

      - name: Append manual release notes file
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          RELEASE_NOTES_FILE: .github/release-notes.md
        with:
          script: |
            const fs = require('fs');

            const notesFile = process.env.RELEASE_NOTES_FILE;
            if (!fs.existsSync(notesFile)) {
              core.info(`${notesFile} not found, skipping manual notes append.`);
              return;
            }

            const manualNotes = fs.readFileSync(notesFile, 'utf8').trim();
            if (!manualNotes) {
              core.info(`${notesFile} is empty, nothing to append.`);
              return;
            }

            const tag = process.env.TAG_NAME;
            const { owner, repo } = context.repo;
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag
            });

            const marker = '## Manual Release Notes';
            const currentBody = (release.body || '').trim();

            if (currentBody.includes(marker)) {
              core.info('Manual release notes already appended.');
              return;
            }

            const manualBlock = `${marker}\n\n${manualNotes}`;
            const updatedBody = [currentBody, manualBlock].filter(Boolean).join('\n\n');

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              body: updatedBody
            });

            core.info(`Manual release notes appended from ${notesFile}.`);
